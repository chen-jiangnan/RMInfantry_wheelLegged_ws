# 底盘控制器配置文件
# 包含: LQR, 腿控制, 旋转控制, 状态估计器

# ==================== 控制频率 ====================
control_frequency: 333.33  # Hz (3ms周期)

# ==================== LQR控制器 ====================
lqr:
  # 固定K矩阵 (2×6)
  K:
    rows: 2
    cols: 6
    data:
      # K[0][*]: T (轮驱动力矩) 对各状态的增益
      # 状态: [theta, dtheta, x, dx, phi, dphi]
      - [-45.0133, -6.0558, -21.2825, -17.7892, 26.8377, 2.1362]
      # K[1][*]: Tp (俯仰力矩) 对各状态的增益
      - [23.7963, 3.4670, 13.7196, 11.0698, 136.5437, 4.6680]

  # 腿长拟合 (可选)
  K_fit:
    enabled: false  # 设为true启用腿长拟合
    min_length: 0.13
    max_length: 0.40
    num_samples: 28
    polynomial: p1*L^2 + p2*L + p3
    coeffs:
      # 12个元素 (2×6, 行优先), 每个3个系数 [p1, p2, p3]
      # 如果不使用拟合,可以全设为0
      - [0.0, 0.0, -45.0133]  # K[0][0]
      - [0.0, 0.0, -6.0558]   # K[0][1]
      - [0.0, 0.0, -21.2825]  # K[0][2]
      - [0.0, 0.0, -17.7892]  # K[0][3]
      - [0.0, 0.0, 26.8377]   # K[0][4]
      - [0.0, 0.0, 2.1362]    # K[0][5]
      - [0.0, 0.0, 23.7963]   # K[1][0]
      - [0.0, 0.0, 3.4670]    # K[1][1]
      - [0.0, 0.0, 13.7196]   # K[1][2]
      - [0.0, 0.0, 11.0698]   # K[1][3]
      - [0.0, 0.0, 136.5437]  # K[1][4]
      - [0.0, 0.0, 4.6680]    # K[1][5]

# ==================== 腿控制器 ====================
leg_control:
  # 弹簧阻尼控制器
  spring_damping:
    pid:
      kp: 1000.0
      ki: 0.0
      kd: 200.0
    max_out: 300.0
    max_iout: 300.0

  # Roll角补偿控制器
  roll_compensation:
    pid:
      kp: 50.0
      ki: 0.0
      kd: 10.0
    max_out: 300.0
    max_iout: 300.0

  # Phi0补偿控制器
  phi0_compensation:
    pid:
      kp: 5.0
      ki: 0.0
      kd: 1.0
    max_out: 10.0
    max_iout: 10.0

  # 重力前馈
  body_gravity: 199.528  # 20.36 * 9.8

# ==================== 旋转控制器 ====================
rotate_control:
  pid:
    kp: 2.0
    ki: 0.0
    kd: 0.5
  max_out: 3.0
  max_iout: 3.0

# ==================== 状态估计器 ====================
state_estimator:
  dt: 0.003  # 采样周期 (s)
  
  # Kalman滤波器参数
  kalman_filter:
    Q: [0.5, 0.5]      # 过程噪声协方差
    R: [100.0, 100.0]  # 测量噪声协方差
