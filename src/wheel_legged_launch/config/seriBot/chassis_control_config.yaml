# 底盘控制器配置文件
# 包含: LQR, 腿控制, 旋转控制, 状态估计器
chassis_control_node:
  ros__parameters:
    # ==================== 模型参数 ====================
    model_config_path: "config/seriBot/model/physical_params.yaml"

    # ==================== 控制频率 ====================
    control_frequency: 333.333  # Hz (3ms周期)

    # ==================== JointFSM ====================
    jfsm:
      # 是否需要校准（单编码器需要，双编码器可跳过）
      require_cali: false

      # cali 策略
      cali:
        # 校准方向：1=正转找限位，-1=反转找限位
        direction: 1
        # 校准速度 (rad/s)
        velocity: 0.5
        # 限位检测力矩阈值 (N*m)，超过此值认为到达限位
        torque_threshold: 8.0
        # 校准超时时间 (s)
        timeout: 5.0

      # reset 策略
      reset:
        # 目标腿长 (m)
        target_leg_length: 0.20
        # 目标腿角 (rad)
        target_leg_angle: 0.0
        # 运动到目标位置的最大速度
        max_velocity: 0.3
        # 认为reset完成的误差阈值
        position_tolerance: 0.01

    # ==================== LQR控制器 ====================
    lqr:
      # 固定K矩阵 (2×6) 0.20腿长参数
      k_matrix:
        rows: 2
        cols: 6
          # 状态: [theta, dtheta, x, dx, phi, dphi]
          # K[0][*]: Tw (驱动轮力矩) 对各状态的增益
          # K[1][*]: Tp (俯仰力矩) 对各状态的增益
        data: [
          -13.160294, -0.799661, -0.631405, -1.101205,  8.950364, 1.196202,
            5.175536,  0.515897,  0.636639,  1.082656, 38.450103, 3.323250
        ]
        
      # 腿长拟合
      leg_fitting:
        enabled: false  # 设为true启用腿长拟合
        min_length: 0.126
        max_length: 0.396
        num_samples: 28
        polynomial: 2  # 二项式拟合
        
        # 将嵌套列表展平
        # 12个元素 (2×6), 每个元素3个系数，总共36个值
        # 格式: [K[0][0].p1, K[0][0].p2, K[0][0].p3, K[0][1].p1, K[0][1].p2, K[0][1].p3, ...]
        #[p1, p2, p3]
        coeffs: [
          37.4339,   -33.3341,   -8.01453,    # K[0][0]
          21.3878,   -27.386,     9.68626,    # K[0][1]
          -0.853441, -1.88747,   -0.401184,   # K[0][2]
          0.252933, -0.618499,   0.626501,   # K[0][3]
          1.51386,  -1.17058,   -0.458182,   # K[0][4]
          3.74695,  -3.73352,    1.22501,    # K[0][5]
          2.1039,   -1.77172,   -0.832583,   # K[1][0]
          6.74415,  -6.55676,    2.11109,    # K[1][1]
          50.177,   -51.3852,    17.087,      # K[1][2]
          -84.1361,   65.4675,    28.7502,     # K[1][3]
          7.86343,  -7.3763,     2.34669,    # K[1][4]
          -9.92879,   7.60416,    2.20018     # K[1][5]
        ]

    # ==================== 腿控制器 ====================
    leg_control:
      # 弹簧阻尼控制器
      spring_damping:
        kp: 130.0
        ki: 0.005
        kd: 8000.0
        max_out: 300.0
        max_iout: 300.0

      # Roll角补偿控制器
      roll_compensation:
        kp: 500.0
        ki: 0.0
        kd: 100.0
        max_out: 300.0
        max_iout: 300.0

      # Phi0补偿控制器
      phi0_compensation:
        kp: 20.0
        ki: 0.1
        kd: 10.0
        max_out: 10.0
        max_iout: 10.0

    # ==================== 旋转控制器 ====================
    rotate_control:
      kp: 2.0
      ki: 0.0
      kd: 3.0
      max_out: 3.0
      max_iout: 3.0

    # ==================== 状态估计器 ====================
    state_estimator:
      dt: 0.003  # 采样周期 (s)
      
      # Kalman滤波器参数
      kalman_filter:
        # 过程噪声协方差
        q0: 0.5
        q1: 0.5
        # 测量噪声协方差
        r0: 100.0
        r1: 100.0